<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — 02145</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --paper: #fff;
      /* Print-first greys: same steps as on screen, shifted darker for thermal */
      --z-hero: #141414;
      --z-strong: #3a3a3a;
      --z-body: #454545;
      --z-muted: #525252;
      --z-quiet: #656565;
      --z-faint: #767676;
      --rule-soft: #b8b8b8;
      --rule-mid: #8a8a8a;
      /* Rhythm: multiples of 4px only */
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      /* Shared column grid (current + forecast rows) */
      --col-icon: 22px;
      --col-day: 34px;
      --col-temps: 52px;
      --gutter-x: 6px;
      --gutter-y: 4px;
      /* One step of vertical rhythm: rules ↔ kickers ↔ content (place, forecast strip, comic) */
      --stack-gap: var(--s2);
      --chart-line: var(--z-strong);
      --chart-fill: color-mix(in srgb, var(--z-muted) 50%, var(--paper));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      justify-items: start;
      align-items: start;
      background: var(--paper);
      color: var(--z-body);
      font-family:
        "Inter",
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "SF Pro Display",
        "Helvetica Neue",
        Helvetica,
        system-ui,
        sans-serif;
      font-optical-sizing: auto;
      font-feature-settings:
        "cv02" 1,
        "cv03" 1,
        "cv04" 1,
        "cv11" 1;
      font-size: 12px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .print-area {
      width: 272px;
      overflow: clip;
      padding: 6px 0 0;
      margin: 0;
      border: none;
    }

    .card-head {
      padding-bottom: var(--s3);
      margin-bottom: 0;
      border-bottom: 1px solid var(--rule-soft);
    }

    .today-date {
      margin-top: 0;
      font-size: 12px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      color: var(--z-quiet);
      letter-spacing: 0.02em;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns:
        var(--col-icon) var(--col-day) minmax(0, 1fr) var(--col-temps);
      column-gap: var(--gutter-x);
      row-gap: var(--gutter-y);
    }

    .current-section .current.forecast-grid {
      margin-top: 0;
    }

    .current.forecast-grid {
      margin-top: var(--s3);
      margin-bottom: 0;
      padding: var(--s4) 0;
      align-items: center;
      /* Single column of rows: avoid stacking row-gap + hi-lo padding */
      row-gap: 0;
    }

    .current-main {
      grid-column: 1 / -1;
      grid-row: 1;
      min-width: 0;
      align-self: center;
      display: flex;
      justify-content: center;
    }

    .current-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--s2);
    }

    .temp-now {
      flex-shrink: 0;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--z-hero);
      font-variation-settings: "opsz" 28;
    }

    .temp-now .deg {
      display: inline-block;
      margin-left: 2px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--z-muted);
      vertical-align: super;
      position: relative;
      top: 0.08em;
      font-variation-settings: "opsz" 14;
    }

    .current .condition-row {
      display: flex;
      align-items: center;
      gap: var(--s2);
      min-width: 0;
      flex: 0 1 auto;
    }

    .current .condition-row .wi {
      flex-shrink: 0;
      font-size: 26px;
      line-height: 1;
      color: var(--z-body);
    }

    .current .condition-row .condition {
      min-width: 0;
      font-size: 15px;
      font-weight: 400;
      color: var(--z-body);
      letter-spacing: 0;
      line-height: 1.25;
    }

    .current.forecast-grid > .hi-lo {
      grid-column: 1 / -1;
      grid-row: 2;
      align-self: start;
      text-align: center;
      padding-top: var(--s1);
    }

    .hi-lo {
      font-size: 10px;
      font-weight: 400;
      color: var(--z-muted);
      line-height: 1.35;
      padding-top: 0;
      margin: 0;
      border: none;
    }

    .hi-lo .hi-lo-label {
      color: var(--z-quiet);
      font-weight: 400;
    }

    .hi-lo .hi-lo-val {
      color: var(--z-strong);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .hi-lo .hi-lo-sep {
      color: var(--z-quiet);
      margin: 0 0.4em;
      font-weight: 400;
    }

    .section-kicker {
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--z-quiet);
      text-align: left;
      line-height: 1.25;
    }

    .place-title {
      padding-top: var(--stack-gap);
      margin-bottom: var(--s2);
    }

    .forecast-title {
      border-top: 1px solid var(--rule-soft);
      padding-top: var(--stack-gap);
      margin-bottom: var(--stack-gap);
    }

    .hourly-title {
      border-top: 1px solid var(--rule-soft);
      padding-top: var(--stack-gap);
      margin-bottom: 0;
      line-height: 1.12;
    }

    .hourly-chart {
      width: 100%;
      margin: 0;
      padding-bottom: var(--stack-gap);
    }

    .hourly-chart svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .hourly-area {
      fill: var(--chart-fill);
    }

    .hourly-line {
      fill: none;
      stroke: var(--chart-line);
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hourly-chart foreignObject .hourly-point-fo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    .hourly-point-fo .wi {
      font-size: 11px;
      line-height: 1;
      color: var(--z-body);
    }

    .hourly-point-fo-temp {
      margin-top: 2px;
      font-size: 8px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      color: var(--z-muted);
    }

    .hourly-times-row {
      display: grid;
      margin-top: 0;
      font-size: 8px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      color: var(--z-muted);
      line-height: 1.2;
    }

    .hourly-time-slot {
      text-align: center;
    }

    .forecast-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      column-gap: var(--s1);
      padding-bottom: var(--stack-gap);
      border-bottom: 1px solid var(--rule-soft);
    }

    .forecast-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: var(--s1);
      min-width: 0;
      padding: 0 var(--s1);
      border-radius: 0;
    }

    .forecast-day .day-name {
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.02em;
      text-transform: capitalize;
      color: var(--z-strong);
      line-height: 1.2;
    }

    .forecast-day .wi {
      font-size: 17px;
      line-height: 1;
      color: var(--z-strong);
    }

    .forecast-day-temps {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: baseline;
      width: 100%;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
      line-height: 1.2;
    }

    .forecast-day-temps .day-hi {
      color: var(--z-hero);
      font-weight: 600;
    }

    .forecast-day-temps .day-lo {
      color: var(--z-muted);
      font-weight: 400;
    }

    .status {
      font-size: 11px;
      padding: var(--s2) 0;
      color: var(--z-muted);
      font-weight: 400;
    }

    .error {
      font-weight: 500;
      color: var(--z-strong);
    }

    .comic-block {
      margin: var(--stack-gap) 0 0;
      padding: 0;
      border: none;
    }

    .comic-title {
      margin: 0 0 var(--stack-gap);
    }

    .comic-stage {
      width: 100%;
      /* height set in JS from image + full-width fit */
      position: relative;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comic-stage img.comic-img {
      display: block;
      flex-shrink: 0;
      max-width: none;
    }

    .comic-fallback {
      font-size: 10px;
      color: var(--z-muted);
      line-height: 1.45;
    }

    .comic-fallback a {
      color: var(--z-strong);
      font-weight: 500;
    }

    .quote-block {
      margin: var(--stack-gap) 0 0;
      padding: 0;
    }

    .quote-title {
      border-top: 1px solid var(--rule-soft);
      padding-top: var(--stack-gap);
      margin-bottom: var(--s1);
    }

    .quote-body {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.45;
      color: var(--z-body);
      letter-spacing: 0.01em;
      text-transform: none;
    }

    .quote-author {
      margin-top: var(--s2);
      font-size: 9px;
      font-weight: 400;
      color: var(--z-muted);
      letter-spacing: 0.02em;
      text-transform: none;
    }
  </style>
</head>
<body>
  <div class="print-area" id="root">
    <div class="status" id="status">Loading weather…</div>
  </div>

  <script>
    const ZIP = "02145";
    const COUNTRY = "United States";

    /**
     * Optional override: full URL to a strip image (?comic= also works).
     * Default is the Watterson mirror (same calendar month/day, year − 40).
     */
    const CALVIN_HOBBES_IMAGE_URL = "";

    /** Last resort if the archive URL fails (e.g. offline build). */
    const COMIC_LOCAL_FALLBACK = "comic.jpg";

    /** [positron11/watterson](https://positron11.github.io/watterson/) — Dec 1985–Dec 1995. */
    const WATTERSON_COMIC_BASE =
      "https://positron11.github.io/watterson/Comic/";

    /** Same month/day as the forecast “today”, strip year minus this (e.g. 2026-03-27 → 1986-03-27). */
    const COMIC_ARCHIVE_YEAR_OFFSET = 40;

    function comicImageUrlFromPage() {
      try {
        const q = new URLSearchParams(window.location.search);
        const u = q.get("comic") || q.get("comicImg");
        return u && u.trim() ? u.trim() : "";
      } catch (_) {
        return "";
      }
    }

    function parseIsoDateParts(iso) {
      const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || "");
      if (!m) return null;
      return { y: m[1], mo: m[2], d: m[3] };
    }

    /** @returns {string} e.g. …/Comic/19860327.gif */
    function wattersonStripGifUrl(iso) {
      const p = parseIsoDateParts(iso);
      if (!p) return "";
      const y = Number(p.y) - COMIC_ARCHIVE_YEAR_OFFSET;
      const ys = String(y).padStart(4, "0");
      return `${WATTERSON_COMIC_BASE}${ys}${p.mo}${p.d}.gif`;
    }

    /** Scale strip to full print width; unrotated → short band (landscape strip). */
    function fitComicToStage(img, stage) {
      const maxW = stage.clientWidth;
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      if (!w || !h) return;
      if (!maxW) {
        requestAnimationFrame(() => fitComicToStage(img, stage));
        return;
      }
      const scale = maxW / w;
      const sw = w * scale;
      const sh = h * scale;
      img.style.width = sw + "px";
      img.style.height = sh + "px";
      stage.style.height = sh + "px";
    }

    function appendComicBlock(root, forecastIsoDate) {
      const block = el("div", "comic-block");
      block.appendChild(
        el("div", "section-kicker comic-title", "Calvin & Hobbes"),
      );

      const archiveUrl = wattersonStripGifUrl(forecastIsoDate);
      const imgUrl =
        (CALVIN_HOBBES_IMAGE_URL || "").trim() ||
        comicImageUrlFromPage() ||
        archiveUrl ||
        COMIC_LOCAL_FALLBACK;

      const stage = el("div", "comic-stage");

      const img = document.createElement("img");
      img.className = "comic-img";
      img.alt = "Calvin and Hobbes";
      img.decoding = "async";
      img.src = imgUrl;

      function showComicFallback() {
        stage.removeAttribute("style");
        stage.innerHTML = "";
        const fb = el("div", "comic-fallback");
        fb.appendChild(
          document.createTextNode(
            "Strip image failed to load. Archive is ~Dec 1985–Dec 1995 (same month/day, ",
          ),
        );
        const off = el("span", null, String(COMIC_ARCHIVE_YEAR_OFFSET));
        off.style.fontFamily = "ui-monospace, monospace";
        off.style.fontSize = "10px";
        fb.appendChild(off);
        fb.appendChild(
          document.createTextNode(
            " years earlier). Override with ",
          ),
        );
        const code = el("span", null, "?comic=");
        code.style.fontFamily = "ui-monospace, monospace";
        code.style.fontSize = "10px";
        fb.appendChild(code);
        fb.appendChild(document.createTextNode(", or place "));
        const code2 = el("span", null, "comic.jpg");
        code2.style.fontFamily = "ui-monospace, monospace";
        code2.style.fontSize = "10px";
        fb.appendChild(code2);
        fb.appendChild(document.createTextNode(" next to this page. Tried "));
        const a = document.createElement("a");
        a.href = archiveUrl || imgUrl;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = "archive URL";
        fb.appendChild(a);
        fb.appendChild(document.createTextNode("."));
        stage.appendChild(fb);
      }

      img.onload = () => fitComicToStage(img, stage);
      if (img.complete) fitComicToStage(img, stage);
      img.onerror = showComicFallback;
      window.addEventListener("resize", () => {
        if (img.naturalWidth) fitComicToStage(img, stage);
      });
      stage.appendChild(img);
      block.appendChild(stage);

      root.appendChild(block);
    }

    function wmoLabel(code) {
      const c = Number(code);
      if (c === 0) return "Clear";
      if (c === 1) return "Mostly clear";
      if (c === 2) return "Partly cloudy";
      if (c === 3) return "Overcast";
      if (c === 45 || c === 48) return "Fog";
      if (c >= 51 && c <= 55) return "Drizzle";
      if (c === 56 || c === 57) return "Freezing drizzle";
      if (c === 61) return "Light rain";
      if (c === 63) return "Rain";
      if (c === 65) return "Heavy rain";
      if (c === 66 || c === 67) return "Freezing rain";
      if (c === 71) return "Light snow";
      if (c === 73) return "Snow";
      if (c === 75) return "Heavy snow";
      if (c === 77) return "Snow grains";
      if (c === 80) return "Rain showers";
      if (c === 81 || c === 82) return "Heavy showers";
      if (c === 85 || c === 86) return "Snow showers";
      if (c === 95) return "Thunderstorm";
      if (c === 96 || c === 99) return "Thunderstorm + hail";
      return "Weather";
    }

    /** WMO codes (Open-Meteo) → [Weather Icons](https://erikflowers.github.io/weather-icons/) class names. */
    function wmoToWiClass(code, isDay) {
      const c = Number(code);
      const d = (dayIcon, nightIcon) => (isDay ? dayIcon : nightIcon);

      if (c === 0) return d("wi-day-sunny", "wi-night-clear");
      if (c === 1) return d("wi-day-sunny", "wi-night-alt-partly-cloudy");
      if (c === 2) return d("wi-day-cloudy", "wi-night-alt-cloudy");
      if (c === 3) return "wi-cloudy";
      if (c === 45 || c === 48) return d("wi-day-fog", "wi-night-fog");
      if (c >= 51 && c <= 55) return d("wi-day-sprinkle", "wi-night-alt-sprinkle");
      if (c === 56 || c === 57) return "wi-sleet";
      if (c === 61) return d("wi-day-sprinkle", "wi-night-alt-sprinkle");
      if (c === 63) return d("wi-day-rain", "wi-night-alt-rain");
      if (c === 65) return d("wi-day-rain-wind", "wi-night-alt-rain-wind");
      if (c === 66 || c === 67) return "wi-rain-mix";
      if (c === 71) return d("wi-day-snow", "wi-night-alt-snow");
      if (c === 73) return d("wi-day-snow", "wi-night-alt-snow");
      if (c === 75) return "wi-snow-wind";
      if (c === 77) return "wi-snow";
      if (c === 80) return d("wi-day-showers", "wi-night-alt-showers");
      if (c === 81 || c === 82) return d("wi-day-storm-showers", "wi-night-alt-storm-showers");
      if (c === 85 || c === 86) return d("wi-day-snow", "wi-night-alt-snow");
      if (c === 95) return d("wi-day-thunderstorm", "wi-night-alt-thunderstorm");
      if (c === 96 || c === 99) {
        return d("wi-day-snow-thunderstorm", "wi-night-alt-snow-thunderstorm");
      }
      return "wi-na";
    }

    function wiIcon(wiClass) {
      const i = document.createElement("i");
      i.className = "wi " + wiClass;
      i.setAttribute("aria-hidden", "true");
      return i;
    }

    function formatDay(isoDate) {
      const d = new Date(isoDate + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday: "short" });
    }

    function formatTodayLong(isoDate, timeZone) {
      const d = new Date(isoDate + "T12:00:00");
      return d.toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
        timeZone,
      });
    }

    /** Open-Meteo hourly `time` is local to `timezone`; slice is `YYYY-MM-DDTHH`. */
    function formatHourShort(iso) {
      const h = Number(iso.slice(11, 13));
      const h12 = h % 12 || 12;
      const ap = h < 12 ? "AM" : "PM";
      return `${h12} ${ap}`;
    }

    function localHourIsDay(iso) {
      const h = Number(iso.slice(11, 13));
      return h >= 7 && h < 19;
    }

    function sliceHourlyWindow(hourly, currentTimeIso) {
      const times = hourly?.time;
      if (!times?.length) return null;
      let start = 0;
      if (currentTimeIso && !Number.isNaN(Date.parse(currentTimeIso))) {
        const curHourStart = currentTimeIso.slice(0, 13) + ":00";
        const idx = times.findIndex((t) => t >= curHourStart);
        start = idx < 0 ? Math.max(0, times.length - 24) : idx;
      }
      const end = Math.min(start + 24, times.length);
      if (end - start < 8) return null;
      return {
        times: times.slice(start, end),
        temps: hourly.temperature_2m.slice(start, end),
        codes: hourly.weather_code.slice(start, end),
      };
    }

    /** Piecewise-linear sample at `xt` using knots `xs` (monotone) and values `vals`. */
    function linearSample(xt, xs, vals) {
      const m = xs.length;
      if (m === 0) return NaN;
      if (m === 1) return vals[0];
      if (xt <= xs[0]) return vals[0];
      if (xt >= xs[m - 1]) return vals[m - 1];
      for (let j = 0; j < m - 1; j++) {
        if (xt >= xs[j] && xt <= xs[j + 1]) {
          const den = xs[j + 1] - xs[j];
          const u = den === 0 ? 0 : (xt - xs[j]) / den;
          return vals[j] + u * (vals[j + 1] - vals[j]);
        }
      }
      return vals[m - 1];
    }

    function appendHourlyPointOverlay(svg, x, yVertex, wiClass, tempVal, foW, foH, gapPx) {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute(
        "transform",
        "translate(" + x.toFixed(2) + "," + yVertex.toFixed(2) + ")",
      );

      const fo = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
      fo.setAttribute("x", String(-foW / 2));
      fo.setAttribute("y", String(-(foH + gapPx)));
      fo.setAttribute("width", String(foW));
      fo.setAttribute("height", String(foH));

      const div = document.createElement("div");
      div.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
      div.className = "hourly-point-fo";
      div.appendChild(wiIcon(wiClass));
      const span = document.createElement("span");
      span.className = "hourly-point-fo-temp";
      span.textContent = String(Math.round(tempVal));
      div.appendChild(span);

      fo.appendChild(div);
      g.appendChild(fo);
      svg.appendChild(g);
    }

    function appendHourlySection(root, slice) {
      const n = slice.temps.length;
      const W = 256;
      const padX = 2;
      const foW = 26;
      const foH = 28;
      const gapPx = 2;
      const stackPx = foH + gapPx;
      /* Top of temp scale: room for foreignObject stack above the warmest vertex only (no extra slack). */
      const plotTop = stackPx;
      const plotInnerH = 32;
      const plotBot = plotTop + plotInnerH;
      const plotH = plotInnerH;
      /* One --s1 band below plot baseline before time row (matches rhythm tokens) */
      const viewHFull = plotBot + 4;

      const temps = slice.temps.map((t) => Number(t));
      let tMin = Math.min(...temps);
      let tMax = Math.max(...temps);
      if (tMax - tMin < 3) {
        const m = (tMin + tMax) / 2;
        tMin = m - 1.5;
        tMax = m + 1.5;
      }
      const innerW = W - 2 * padX;
      const xAt = (i) =>
        n <= 1 ? W / 2 : padX + ((i + 0.5) / n) * innerW;
      const yAt = (t) => plotTop + ((tMax - t) / (tMax - tMin)) * plotH;

      const pts = [];
      for (let i = 0; i < n; i++) {
        const x = xAt(i);
        const y = yAt(temps[i]);
        pts.push(`${x.toFixed(2)},${y.toFixed(2)}`);
      }
      const x0 = xAt(0);
      const xL = xAt(n - 1);
      const dArea =
        `M ${x0.toFixed(2)},${plotBot} L ` +
        pts.join(" L ") +
        ` L ${xL.toFixed(2)},${plotBot} Z`;

      const xs = temps.map((_, i) => xAt(i));
      const ys = temps.map((t) => yAt(t));

      let minOverlayTop = Infinity;
      for (let k = 0; k < n; k += 3) {
        const span = Math.min(3, n - k);
        const xCenter = (xAt(k) + xAt(k + span - 1)) / 2;
        const yOnLine = linearSample(xCenter, xs, ys);
        minOverlayTop = Math.min(minOverlayTop, yOnLine - stackPx);
      }
      /* Trim empty SVG band above overlays (cold start of day leaves a tall white wedge). */
      const yCrop = Math.max(0, minOverlayTop - 4);
      const viewH = viewHFull - yCrop;

      const block = el("div", "hourly-block");
      block.appendChild(
        el("div", "section-kicker hourly-title", "Hour by hour"),
      );
      const wrap = el("div", "hourly-chart");
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 " + yCrop + " " + W + " " + viewH);
      svg.setAttribute("role", "img");
      svg.setAttribute("aria-label", "Hourly temperature");
      svg.innerHTML =
        '<path d="' +
        dArea +
        '" class="hourly-area"></path><polyline class="hourly-line" points="' +
        pts.join(" ") +
        '"></polyline>';

      for (let k = 0; k < n; k += 3) {
        const span = Math.min(3, n - k);
        const xCenter = (xAt(k) + xAt(k + span - 1)) / 2;
        const yOnLine = linearSample(xCenter, xs, ys);
        const tempShown = Math.round(linearSample(xCenter, xs, temps));
        const midIdx = k + Math.floor((span - 1) / 2);
        const day = localHourIsDay(slice.times[midIdx]);
        appendHourlyPointOverlay(
          svg,
          xCenter,
          yOnLine,
          wmoToWiClass(slice.codes[midIdx], day),
          tempShown,
          foW,
          foH,
          gapPx,
        );
      }

      wrap.appendChild(svg);

      const gridCols = `repeat(${n}, minmax(0,1fr))`;
      const timesRow = el("div", "hourly-times-row");
      timesRow.style.gridTemplateColumns = gridCols;
      for (let k = 0; k < n; k += 3) {
        const span = Math.min(3, n - k);
        const timeSlot = el(
          "span",
          "hourly-time-slot",
          formatHourShort(slice.times[k]),
        );
        timeSlot.style.gridColumn = `${k + 1} / span ${span}`;
        timesRow.appendChild(timeSlot);
      }
      wrap.appendChild(timesRow);
      block.appendChild(wrap);
      root.appendChild(block);
    }

    function el(tag, className, text) {
      const n = document.createElement(tag);
      if (className) n.className = className;
      if (text != null) n.textContent = text;
      return n;
    }

    /**
     * DummyJSON random quote: https://dummyjson.com/docs/quotes — `{ quote, author }`.
     * Some entries are title case (every letter-word starts with A–Z); normalize to sentence case.
     */
    function quoteLetterWords(s) {
      return s.match(/[A-Za-z]+(?:'[A-Za-z]+)?/g) || [];
    }

    function isLikelyEveryWordCapitalized(s) {
      const words = quoteLetterWords(s);
      if (words.length < 2) return false;
      return words.every((w) => /^[A-Z]/.test(w));
    }

    function toSentenceCase(s) {
      let r = s.trim().toLowerCase();
      r = r.replace(/^([^a-z]*)([a-z])/, (_, pre, ch) => pre + ch.toUpperCase());
      r = r.replace(/([.!?]+["']*\s+)([a-z])/g, (_, a, b) => a + b.toUpperCase());
      return r;
    }

    function normalizeDummyJsonQuoteText(q) {
      const t = String(q).trim();
      if (!t) return t;
      if (isLikelyEveryWordCapitalized(t)) return toSentenceCase(t);
      return t;
    }

    function mountQuoteBlock(root, row) {
      if (!row || typeof row.q !== "string" || !row.q.trim()) return;
      const body = normalizeDummyJsonQuoteText(row.q);
      const block = el("div", "quote-block");
      block.appendChild(
        el("div", "section-kicker quote-title", "Quote"),
      );
      block.appendChild(el("div", "quote-body", body));
      if (row.a && String(row.a).trim()) {
        block.appendChild(
          el("div", "quote-author", "— " + String(row.a).trim()),
        );
      }
      root.appendChild(block);
    }

    async function appendQuoteBlock(root) {
      try {
        const res = await fetch("https://dummyjson.com/quotes/random");
        if (res.ok) {
          const d = await res.json();
          if (d.quote && String(d.quote).trim()) {
            mountQuoteBlock(root, {
              q: String(d.quote).trim(),
              a: d.author ? String(d.author).trim() : "",
            });
          }
        }
      } catch (_) {
        /* Omit section */
      }
    }

    async function main() {
      const root = document.getElementById("root");

      const geoUrl =
        "https://geocoding-api.open-meteo.com/v1/search?name=" +
        encodeURIComponent(ZIP) +
        "&country=" +
        encodeURIComponent(COUNTRY) +
        "&count=1";

      let lat = 42.3876;
      let lon = -71.0995;
      let place = "02145";

      try {
        const geoRes = await fetch(geoUrl);
        const geo = await geoRes.json();
        if (geo.results?.[0]) {
          const r = geo.results[0];
          lat = r.latitude;
          lon = r.longitude;
          place = [r.name, r.admin1].filter(Boolean).join(", ") || ZIP;
        }
      } catch (_) {
        place = "02145 (fallback loc.)";
      }

      const params = new URLSearchParams({
        latitude: String(lat),
        longitude: String(lon),
        current: "temperature_2m,weather_code,is_day",
        hourly: "temperature_2m,weather_code",
        daily: "weather_code,temperature_2m_max,temperature_2m_min",
        timezone: "America/New_York",
        forecast_days: "6",
        temperature_unit: "fahrenheit",
        wind_speed_unit: "mph",
      });

      const fcUrl = "https://api.open-meteo.com/v1/forecast?" + params.toString();
      const fcRes = await fetch(fcUrl);
      if (!fcRes.ok) throw new Error("Forecast request failed");
      const data = await fcRes.json();

      const cur = data.current;
      const daily = data.daily;
      if (!cur || !daily?.time?.length) throw new Error("Incomplete forecast data");

      const todayLow = daily.temperature_2m_min[0];
      const todayHigh = daily.temperature_2m_max[0];
      const curCond = wmoLabel(cur.weather_code);
      const curDay = cur.is_day === 1;
      const curWi = wmoToWiClass(cur.weather_code, curDay);

      root.innerHTML = "";

      const head = el("div", "card-head");
      head.appendChild(
        el(
          "div",
          "today-date",
          formatTodayLong(daily.time[0], "America/New_York"),
        ),
      );
      root.appendChild(head);

      const currentSection = el("div", "current-section");
      currentSection.appendChild(
        el("div", "section-kicker place-title", place + " · " + ZIP),
      );

      const current = el("div", "current forecast-grid");

      const main = el("div", "current-main");
      const top = el("div", "current-top");
      const nowWrap = el("div", "temp-now");
      nowWrap.appendChild(document.createTextNode(Math.round(cur.temperature_2m)));
      const deg = el("span", "deg", "°F");
      nowWrap.appendChild(deg);
      top.appendChild(nowWrap);
      const condRow = el("div", "condition-row");
      condRow.appendChild(wiIcon(curWi));
      condRow.appendChild(el("div", "condition", curCond));
      top.appendChild(condRow);
      main.appendChild(top);
      current.appendChild(main);

      const hiLo = el("div", "hi-lo");
      hiLo.appendChild(el("span", "hi-lo-label", "Low "));
      hiLo.appendChild(el("span", "hi-lo-val", Math.round(todayLow) + "°"));
      hiLo.appendChild(el("span", "hi-lo-sep", "·"));
      hiLo.appendChild(el("span", "hi-lo-label", " High "));
      hiLo.appendChild(el("span", "hi-lo-val", Math.round(todayHigh) + "°"));
      current.appendChild(hiLo);

      currentSection.appendChild(current);
      root.appendChild(currentSection);

      const hourlySlice = sliceHourlyWindow(
        data.hourly,
        cur.time || data.hourly?.time?.[0] || "",
      );
      if (hourlySlice) appendHourlySection(root, hourlySlice);

      root.appendChild(
        el("div", "section-kicker forecast-title", "5-day forecast"),
      );

      const strip = el("div", "forecast-strip");
      for (let i = 1; i < 6; i++) {
        const day = el("div", "forecast-day");
        day.appendChild(el("div", "day-name", formatDay(daily.time[i])));
        const dayWi = wmoToWiClass(daily.weather_code[i], true);
        day.appendChild(wiIcon(dayWi));
        const temps = el("div", "forecast-day-temps");
        temps.appendChild(
          el("span", "day-hi", Math.round(daily.temperature_2m_max[i]) + "°"),
        );
        temps.appendChild(
          el("span", "day-lo", Math.round(daily.temperature_2m_min[i]) + "°"),
        );
        day.appendChild(temps);
        strip.appendChild(day);
      }
      root.appendChild(strip);

      appendComicBlock(root, daily.time[0]);
      await appendQuoteBlock(root);
    }

    main().catch((err) => {
      const root = document.getElementById("root");
      root.innerHTML =
        '<div class="status error">Could not load weather.</div>' +
        '<div class="status">' +
        (err && err.message ? err.message : "Unknown error") +
        "</div>";
    });
  </script>
</body>
</html>
